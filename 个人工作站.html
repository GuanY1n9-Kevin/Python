<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>Workspace | 终极备份版 (槽位对齐)</title>
    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.9);
            --accent: #4a90e2;
            --text: #2c3e50;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: linear-gradient(135deg, #e0eafc 0%, #cfdef3 100%);
            margin: 0; padding: 20px; height: 100vh;
            display: flex; flex-direction: column; box-sizing: border-box; color: var(--text);
        }

        .main-container { display: flex; flex: 1; gap: 20px; min-height: 0; margin-bottom: 20px; }

        .glass-card {
            background: var(--glass); backdrop-filter: blur(15px);
            border-radius: 20px; border: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 8px 32px rgba(31, 38, 135, 0.08); padding: 20px;
            display: flex; flex-direction: column;
        }

        /* 左侧面板 & 待办清单动态样式 */
        .sidebar { width: 320px; gap: 15px; }

        .todo-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .todo-header-actions { display: flex; gap: 8px; }

        .btn-icon {
            background: var(--accent); color: white; border: none; border-radius: 50%;
            width: 24px; height: 24px; cursor: pointer; display: flex; align-items: center;
            justify-content: center; font-weight: bold; font-size: 14px; transition: 0.2s;
        }
        .btn-icon:hover { transform: scale(1.1); box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        .btn-icon.history { background: #95a5a6; }

        .todo-input-area { display: none; gap: 8px; margin-bottom: 15px; }
        .todo-input-area input { flex: 1; padding: 6px 10px; border: 1px solid #ddd; border-radius: 6px; outline: none; font-family: inherit;}
        .todo-input-area button { background: var(--accent); color: white; border: none; border-radius: 6px; padding: 0 12px; cursor: pointer; font-size: 12px;}

        .todo-list { flex: 1; overflow-y: auto; padding-right: 5px; }
        .todo-item { display: flex; align-items: center; margin-bottom: 10px; font-size: 14px; transition: 0.2s; padding: 4px 0; }
        .todo-item input { margin-right: 10px; cursor: pointer; transform: scale(1.1); }
        .todo-item label { flex: 1; cursor: pointer; transition: 0.2s; }

        .todo-delete { color: #ff4d4f; cursor: pointer; opacity: 0; transition: 0.2s; font-size: 18px; font-weight: bold; padding: 0 5px; }
        .todo-item:hover .todo-delete { opacity: 0.7; }
        .todo-delete:hover { opacity: 1 !important; }

        /* 排程编辑器 */
        .event-editor { background: rgba(0,0,0,0.03); padding: 15px; border-radius: 15px; }
        .event-editor input { width: 100%; padding: 8px; margin-bottom: 8px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        .btn-add { width: 100%; background: var(--accent); color: white; border: none; padding: 10px; border-radius: 8px; cursor: pointer; font-weight: bold; }

        /* 右侧日历核心结构 */
        .calendar-area { flex: 1; display: flex; flex-direction: column; padding: 10px; }
        .month-nav { display: flex; justify-content: center; align-items: center; gap: 20px; margin-bottom: 15px; }
        .month-title { font-size: 1.2rem; font-weight: bold; min-width: 120px; text-align: center; }
        .nav-btn { background: none; border: none; font-size: 18px; color: #666; cursor: pointer; padding: 5px 15px; border-radius: 8px; transition: 0.2s; }
        .nav-btn:hover { background: rgba(0,0,0,0.05); color: var(--accent); }
        .btn-today { font-size: 12px; border: 1px solid #ddd; padding: 4px 10px; margin-left: 10px; }

        .calendar-grid {
            display: grid; grid-template-columns: repeat(7, 1fr); gap: 1px; flex: 1;
            background: rgba(0, 0, 0, 0.08); border: 1px solid rgba(0, 0, 0, 0.08); border-radius: 12px; overflow: hidden;
        }
        .cal-head { text-align: center; font-size: 11px; font-weight: bold; color: #666; padding: 10px 0; background: rgba(255,255,255,0.6); }
        .cal-day { background: rgba(255,255,255,0.7); padding: 5px 0; min-height: 80px; display: flex; flex-direction: column; }
        .day-num { font-size: 12px; font-weight: bold; color: #555; margin: 0 8px 4px 8px; }

        .today { background: rgba(74, 144, 226, 0.15); }
        .today .day-num { color: var(--accent); }

        .event-bar {
            height: 22px; line-height: 22px; color: white; font-size: 11px; margin-bottom: 2px; position: relative; z-index: 5;
            white-space: nowrap; overflow: hidden; text-overflow: clip; margin-left: -1px; margin-right: -1px; padding-left: 4px;
            cursor: pointer;
        }
        .edge-left { margin-left: 8px !important; padding-left: 8px !important; border-top-left-radius: 4px; border-bottom-left-radius: 4px; }
        .edge-right { margin-right: 8px !important; padding-right: 8px !important; border-top-right-radius: 4px; border-bottom-right-radius: 4px; }

        /* 底部导航 */
        .bottom-nav { height: 80px; display: flex; gap: 15px; }
        .nav-item {
            flex: 1; background: var(--glass); border-radius: 12px;
            display: flex; align-items: center; justify-content: center; gap: 8px;
            text-decoration: none; color: inherit; font-size: 15px; font-weight: 500; transition: 0.2s;
        }
        .nav-item:hover { background: #fff; transform: translateY(-3px); box-shadow: 0 5px 15px rgba(0,0,0,0.05); }

        /* 顶部操作按钮 */
        .header-actions { display: flex; gap: 10px; align-items: center; }
        .action-btn {
            font-size: 12px; border: 1px solid #ddd; background: white; border-radius: 6px;
            padding: 5px 10px; cursor: pointer; transition: 0.2s; color: #555;
        }
        .action-btn:hover { background: #f0f0f0; }
        .action-btn.danger { color: #ff4d4f; border-color: #ffcccc; }
        .action-btn.danger:hover { background: #fff0f0; }

        /* 右键悬浮菜单样式 */
        .context-menu {
            position: absolute;
            background: white;
            border: 1px solid #eee;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.15);
            padding: 6px;
            display: none;
            z-index: 9999;
        }
        .context-menu-item {
            padding: 8px 15px;
            cursor: pointer;
            font-size: 13px;
            font-weight: bold;
            border-radius: 6px;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: background 0.2s;
        }
        .context-menu-item:hover {
            background: #f5f5f5;
        }
        .context-menu-item.danger { color: #ff4d4f; }
        .context-menu-item.danger:hover { background: #fff0f0; }
        .context-menu-item.primary { color: var(--accent); }
        .context-menu-item.primary:hover { background: #f0f7ff; }

        /* 历史记录弹窗样式 */
        .modal-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.4); z-index: 10000; justify-content: center; align-items: center;
        }
        .history-modal {
            background: white; border-radius: 15px; width: 450px; max-height: 80vh;
            display: flex; flex-direction: column; padding: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        .history-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #eee; padding-bottom: 10px; margin-bottom: 10px; }
        .history-list { overflow-y: auto; flex: 1; padding-right: 5px; }
        .history-item-row { padding: 10px; border-bottom: 1px dashed #eee; display: flex; flex-direction: column; gap: 5px; }
        .history-time { font-size: 12px; color: #888; font-family: monospace; }
        .history-text { font-size: 14px; color: #555; text-decoration: line-through; }
        .btn-close-modal { background: #f0f0f0; border: none; padding: 5px 10px; border-radius: 6px; cursor: pointer; color: #555; }
        .btn-close-modal:hover { background: #e0e0e0; }
    </style>
</head>
<body>

<header style="margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center;">
    <h2 style="margin:0;">Workspace</h2>
    <div class="header-actions">
        <button class="action-btn" onclick="exportData()" title="将当前数据下载到电脑">📥 备份数据</button>
        <button class="action-btn" onclick="document.getElementById('importFile').click()" title="从电脑读取备份文件">📤 恢复数据</button>
        <button class="action-btn danger" onclick="clearData()" title="清空日历排程">🗑️ 清空排程</button>
        <input type="file" id="importFile" style="display:none" accept=".json" onchange="importData(event)">
    </div>
</header>

<div class="main-container">
    <div class="glass-card sidebar">
        <div class="todo-header">
            <h3 style="margin: 0;">📋 待办清单</h3>
            <div class="todo-header-actions">
                <button class="btn-icon history" onclick="showHistoryModal()" title="查看已删除的历史记录">🕒</button>
                <button class="btn-icon" onclick="toggleTodoInput()" title="新增待办">➕</button>
            </div>
        </div>

        <div class="todo-input-area" id="todoInputArea">
            <input type="text" id="newTodoText" placeholder="输入新任务 (按回车保存)..." onkeypress="if(event.key==='Enter') addTodo()">
            <button onclick="addTodo()">确定</button>
        </div>

        <div class="todo-list" id="todoList"></div>

        <div class="event-editor">
            <h3 style="font-size: 0.9rem; margin-top:0">📅 添加日历排程</h3>
            <input type="text" id="evName" placeholder="事项名称...">
            <input type="date" id="evStart">
            <input type="date" id="evEnd">
            <button class="btn-add" onclick="addEvent()">保存并显示</button>
        </div>
    </div>

    <div class="glass-card calendar-area">
        <div class="month-nav">
            <button class="nav-btn" onclick="changeMonth(-1)">◀</button>
            <div class="month-title" id="calendarMonthDisplay"></div>
            <button class="nav-btn" onclick="changeMonth(1)">▶</button>
            <button class="nav-btn btn-today" onclick="goToday()">返回今天</button>
        </div>
        <div class="calendar-grid" id="calendarGrid"></div>
    </div>
</div>

<div class="bottom-nav">
    <a href="https://gemini.google.com" target="_blank" class="nav-item">✨ Gemini</a>
    <a href="https://chatgpt.com" target="_blank" class="nav-item">🤖 ChatGPT</a>
    <a href="https://www.doubao.com" target="_blank" class="nav-item">🥟 豆包</a>
    <a href="https://www.bilibili.com" target="_blank" class="nav-item">📺 Bilibili</a>
    <a href="https://www.douyin.com" target="_blank" class="nav-item">🎵 抖音</a>
</div>

<div id="contextMenu" class="context-menu">
    <div class="context-menu-item primary" onclick="renameTargetEvent()">✏️ 重命名此排程</div>
    <div class="context-menu-item danger" onclick="deleteTargetEvent()">🗑️ 删除此排程</div>
</div>

<div id="todoContextMenu" class="context-menu">
    <div class="context-menu-item primary" onclick="renameTargetTodo()">✏️ 重命名此待办</div>
</div>

<div id="historyModal" class="modal-overlay" onclick="if(event.target === this) hideHistoryModal()">
    <div class="history-modal">
        <div class="history-header">
            <h3 style="margin: 0; color: #2c3e50;">🕒 待办历史归档</h3>
            <div>
                <button class="btn-close-modal" style="color: #ff4d4f; background: #fff0f0; margin-right: 5px;" onclick="clearHistory()">清空历史</button>
                <button class="btn-close-modal" onclick="hideHistoryModal()">关闭</button>
            </div>
        </div>
        <div class="history-list" id="historyListContent">
            </div>
    </div>
</div>

<script>
    // ==========================================
    // 待办清单 & 历史记录逻辑
    // ==========================================
    let todos = JSON.parse(localStorage.getItem('ws_todos_v1') || '[]');
    let todoHistory = JSON.parse(localStorage.getItem('ws_todo_history_v1') || '[]');

    if (todos.length === 0 && !localStorage.getItem('ws_todos_init')) {
        todos = [
            { id: 'todo_1', text: '确认生产参数', checked: false },
            { id: 'todo_2', text: '更新颜色手册', checked: false },
            { id: 'todo_3', text: '检查仪器连接', checked: false }
        ];
        localStorage.setItem('ws_todos_init', 'true');
        saveTodos();
    }

    function renderTodos() {
        const list = document.getElementById('todoList');
        list.innerHTML = '';
        todos.forEach((todo, index) => {
            const textStyle = todo.checked ? 'text-decoration: line-through; opacity: 0.5;' : '';
            list.innerHTML += `
                <div class="todo-item" oncontextmenu="showTodoContextMenu(event, ${index})">
                    <input type="checkbox" id="${todo.id}" ${todo.checked ? 'checked' : ''} onchange="toggleTodo(${index})">
                    <label for="${todo.id}" style="${textStyle}">${todo.text}</label>
                    <span class="todo-delete" onclick="deleteTodo(${index})" title="删除任务">&times;</span>
                </div>
            `;
        });
    }

    function toggleTodoInput() {
        const area = document.getElementById('todoInputArea');
        if (area.style.display === 'none' || area.style.display === '') {
            area.style.display = 'flex';
            document.getElementById('newTodoText').focus();
        } else {
            area.style.display = 'none';
        }
    }

    function addTodo() {
        const input = document.getElementById('newTodoText');
        const text = input.value.trim();
        if (!text) return;

        todos.push({ id: 'todo_' + Date.now(), text: text, checked: false });
        saveTodos();
        renderTodos();

        input.value = '';
        toggleTodoInput();
    }

    function toggleTodo(index) {
        todos[index].checked = !todos[index].checked;
        saveTodos();
        renderTodos();
    }

    function deleteTodo(index) {
        const deletedItem = todos.splice(index, 1)[0];
        const now = new Date();
        const timeStr = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2, '0')}-${String(now.getDate()).padStart(2, '0')} ${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}`;

        todoHistory.unshift({ text: deletedItem.text, time: timeStr });

        saveTodos();
        saveHistory();
        renderTodos();
    }

    function saveTodos() {
        localStorage.setItem('ws_todos_v1', JSON.stringify(todos));
    }

    function saveHistory() {
        localStorage.setItem('ws_todo_history_v1', JSON.stringify(todoHistory));
    }

    // ==========================================
    // 历史记录看板逻辑
    // ==========================================
    function showHistoryModal() {
        const modal = document.getElementById('historyModal');
        const content = document.getElementById('historyListContent');

        content.innerHTML = '';
        if (todoHistory.length === 0) {
            content.innerHTML = '<div style="text-align:center; padding: 20px; color:#aaa;">暂无历史记录</div>';
        } else {
            todoHistory.forEach(item => {
                content.innerHTML += `
                    <div class="history-item-row">
                        <span class="history-time">${item.time}</span>
                        <span class="history-text">${item.text}</span>
                    </div>
                `;
            });
        }

        modal.style.display = 'flex';
    }

    function hideHistoryModal() {
        document.getElementById('historyModal').style.display = 'none';
    }

    function clearHistory() {
        if(confirm("确定要清空所有的历史归档记录吗？不可恢复。")) {
            todoHistory = [];
            saveHistory();
            showHistoryModal();
        }
    }


    // ==========================================
    // 待办清单 - 右键悬浮菜单逻辑
    // ==========================================
    let targetTodoIndex = -1;

    function showTodoContextMenu(e, index) {
        e.preventDefault();
        targetTodoIndex = index;
        hideContextMenu();

        const menu = document.getElementById('todoContextMenu');
        menu.style.display = 'block';

        let left = e.pageX;
        let top = e.pageY;
        if (left + 150 > window.innerWidth) left -= 150;
        if (top + 40 > window.innerHeight) top -= 40;

        menu.style.left = left + 'px';
        menu.style.top = top + 'px';
    }

    function hideTodoContextMenu() {
        document.getElementById('todoContextMenu').style.display = 'none';
    }

    function renameTargetTodo() {
        if (targetTodoIndex > -1) {
            const currentText = todos[targetTodoIndex].text;
            const newText = prompt("✏️ 请输入新的待办内容：", currentText);

            if (newText !== null && newText.trim() !== "") {
                todos[targetTodoIndex].text = newText.trim();
                saveTodos();
                renderTodos();
            }
            hideTodoContextMenu();
            targetTodoIndex = -1;
        }
    }

    // ==========================================
    // 日历排程 - 右键悬浮菜单逻辑
    // ==========================================
    let targetEventIndex = -1;

    function showContextMenu(e, index) {
        e.preventDefault();
        targetEventIndex = index;
        hideTodoContextMenu();

        const menu = document.getElementById('contextMenu');
        menu.style.display = 'block';

        let left = e.pageX;
        let top = e.pageY;
        if (left + 120 > window.innerWidth) left -= 120;
        if (top + 70 > window.innerHeight) top -= 70; // 调整高度防止超出

        menu.style.left = left + 'px';
        menu.style.top = top + 'px';
    }

    function hideContextMenu() {
        document.getElementById('contextMenu').style.display = 'none';
    }

    function renameTargetEvent() {
        if (targetEventIndex > -1) {
            const currentName = events[targetEventIndex].name;
            const newName = prompt("✏️ 请输入新的排程名称：", currentName);

            if (newName !== null && newName.trim() !== "") {
                events[targetEventIndex].name = newName.trim();
                localStorage.setItem('ws_events_perfect_v3', JSON.stringify(events));
                renderCalendar();
            }
            hideContextMenu();
            targetEventIndex = -1;
        }
    }

    function deleteTargetEvent() {
        if (targetEventIndex > -1) {
            events.splice(targetEventIndex, 1);
            localStorage.setItem('ws_events_perfect_v3', JSON.stringify(events));
            renderCalendar();
            hideContextMenu();
            targetEventIndex = -1;
        }
    }

    // 点击页面任意地方隐藏所有右键菜单
    document.addEventListener('click', () => {
        hideContextMenu();
        hideTodoContextMenu();
    });

    // ==========================================
    // 日历排程逻辑 (包含全新智能槽位分配算法)
    // ==========================================
    const palette = [
        '#E53935', '#880E4F', '#D81B60', '#8E24AA', '#3949AB', '#1E88E5',
        '#00897B', '#43A047', '#9E9D24', '#F4511E', '#6D4C41', '#546E7A'
    ];
    let events = JSON.parse(localStorage.getItem('ws_events_perfect_v3') || '[]');
    let viewDate = new Date();
    let currentYear = viewDate.getFullYear();
    let currentMonth = viewDate.getMonth();

    function getDatesInRange(startDate, endDate) {
        let dates = [];
        let curr = new Date(startDate);
        let end = new Date(endDate);
        while (curr <= end) {
            dates.push(`${curr.getFullYear()}-${String(curr.getMonth() + 1).padStart(2, '0')}-${String(curr.getDate()).padStart(2, '0')}`);
            curr.setDate(curr.getDate() + 1);
        }
        return dates;
    }

    function renderCalendar() {
        const grid = document.getElementById('calendarGrid');
        grid.innerHTML = '';
        document.getElementById('calendarMonthDisplay').innerText = `${currentYear}年 ${currentMonth + 1}月`;

        const weeks = ['SUN', 'MON', 'TUE', 'WED', 'THU', 'FRI', 'SAT'];
        weeks.forEach(w => grid.innerHTML += `<div class="cal-head">${w}</div>`);

        const firstDay = new Date(currentYear, currentMonth, 1).getDay();
        const lastDate = new Date(currentYear, currentMonth + 1, 0).getDate();
        const realToday = new Date();

        let daySlots = {};

        let processedEvents = events.map((ev, index) => ({ ...ev, originalIndex: index }))
            .sort((a, b) => {
                if (a.start !== b.start) return a.start.localeCompare(b.start);
                return b.end.localeCompare(a.end);
            });

        processedEvents.forEach(ev => {
            let spanDates = getDatesInRange(ev.start, ev.end);
            let slot = 0;
            let slotFound = false;

            while (!slotFound) {
                let conflict = false;
                for (let d of spanDates) {
                    if (daySlots[d] && daySlots[d][slot]) {
                        conflict = true; break;
                    }
                }
                if (!conflict) {
                    slotFound = true;
                } else {
                    slot++;
                }
            }

            spanDates.forEach(d => {
                if (!daySlots[d]) daySlots[d] = [];
                daySlots[d][slot] = ev;
            });
        });

        for (let i = 0; i < firstDay; i++) grid.innerHTML += '<div class="cal-day"></div>';

        for (let i = 1; i <= lastDate; i++) {
            const dateStr = `${currentYear}-${String(currentMonth + 1).padStart(2, '0')}-${String(i).padStart(2, '0')}`;
            const isToday = (i === realToday.getDate() && currentMonth === realToday.getMonth() && currentYear === realToday.getFullYear()) ? 'today' : '';
            const currentWeekDay = new Date(currentYear, currentMonth, i).getDay();

            let evHtml = '';
            let slotsToday = daySlots[dateStr] || [];

            for (let slot = 0; slot < slotsToday.length; slot++) {
                const ev = slotsToday[slot];
                if (ev) {
                    const color = palette[ev.originalIndex % palette.length];
                    let classNames = "event-bar";
                    let displayName = "&nbsp;";

                    if (dateStr === ev.start || currentWeekDay === 0 || i === 1) {
                        classNames += " edge-left";
                        displayName = ev.name;
                    }
                    if (dateStr === ev.end || currentWeekDay === 6 || i === lastDate) {
                        classNames += " edge-right";
                    }

                    evHtml += `<div class="${classNames}" style="background:${color}" title="${ev.name} (${ev.start} ~ ${ev.end})" oncontextmenu="showContextMenu(event, ${ev.originalIndex})">${displayName}</div>`;
                } else {
                    evHtml += `<div style="height: 24px; pointer-events: none;"></div>`;
                }
            }

            grid.innerHTML += `
                <div class="cal-day ${isToday}">
                    <span class="day-num">${i}</span>
                    <div style="display:flex; flex-direction:column;">${evHtml}</div>
                </div>`;
        }
    }

    function changeMonth(offset) {
        currentMonth += offset;
        if (currentMonth < 0) { currentMonth = 11; currentYear--; }
        else if (currentMonth > 11) { currentMonth = 0; currentYear++; }
        renderCalendar();
    }

    function goToday() {
        const now = new Date();
        currentYear = now.getFullYear();
        currentMonth = now.getMonth();
        renderCalendar();
    }

    function addEvent() {
        const name = document.getElementById('evName').value;
        const start = document.getElementById('evStart').value;
        const end = document.getElementById('evEnd').value;
        if (!name || !start || !end) return alert("请填写完整的排程信息！");
        if (start > end) return alert("开始日期不能晚于结束日期！");

        events.push({ name, start, end });
        localStorage.setItem('ws_events_perfect_v3', JSON.stringify(events));
        renderCalendar();

        const startYear = parseInt(start.split('-')[0]);
        const startMonth = parseInt(start.split('-')[1]) - 1;
        if (currentYear !== startYear || currentMonth !== startMonth) {
            currentYear = startYear;
            currentMonth = startMonth;
            renderCalendar();
        }
        document.getElementById('evName').value = '';
    }

    function clearData() {
        if(confirm("确定要清空日历上的所有排程吗？（待办清单不会被清空）")) {
            events = [];
            localStorage.setItem('ws_events_perfect_v3', JSON.stringify(events));
            renderCalendar();
        }
    }

    // ==========================================
    // 数据备份与恢复逻辑 (包含历史记录)
    // ==========================================
    let fileHandle;

    async function exportData() {
        const data = {
            todos: localStorage.getItem('ws_todos_v1'),
            history: localStorage.getItem('ws_todo_history_v1'),
            events: localStorage.getItem('ws_events_perfect_v3')
        };
        const dataStr = JSON.stringify(data, null, 2);

        try {
            if (window.showSaveFilePicker) {
                if (!fileHandle) {
                    fileHandle = await window.showSaveFilePicker({
                        suggestedName: 'workspace_backup.json',
                        types: [{ description: 'JSON 数据备份', accept: { 'application/json': ['.json'] } }]
                    });
                }
                const writable = await fileHandle.createWritable();
                await writable.write(dataStr);
                await writable.close();

                const btn = document.querySelector('button[title="将当前数据下载到电脑"]');
                const originalText = btn.innerText;
                btn.innerText = "✅ 已覆盖保存";
                setTimeout(() => btn.innerText = originalText, 2000);
            } else {
                const blob = new Blob([dataStr], { type: "text/json" });
                const downloadAnchorNode = document.createElement('a');
                downloadAnchorNode.href = URL.createObjectURL(blob);
                downloadAnchorNode.download = "workspace_backup.json";
                document.body.appendChild(downloadAnchorNode);
                downloadAnchorNode.click();
                downloadAnchorNode.remove();
            }
        } catch (err) {
            console.log("保存取消或失败:", err);
        }
    }

    function importData(event) {
        const file = event.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = function(e) {
            try {
                const importedData = JSON.parse(e.target.result);

                if (importedData.todos) {
                    localStorage.setItem('ws_todos_v1', importedData.todos);
                    todos = JSON.parse(importedData.todos);
                }
                if (importedData.history) {
                    localStorage.setItem('ws_todo_history_v1', importedData.history);
                    todoHistory = JSON.parse(importedData.history);
                }
                if (importedData.events) {
                    localStorage.setItem('ws_events_perfect_v3', importedData.events);
                    events = JSON.parse(importedData.events);
                }

                renderTodos();
                renderCalendar();
                alert("🎉 数据恢复成功！");
            } catch (err) {
                alert("❌ 文件格式不正确，恢复失败！请确保上传的是之前导出的 .json 文件。");
            }
        };
        reader.readAsText(file);
        event.target.value = '';
    }

    window.onload = () => {
        renderCalendar();
        renderTodos();
    };
</script>
</body>
</html>
